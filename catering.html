<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Coffee &amp; Crumbs VA | Redirecting</title>
 <meta name="robots" content="noindex, follow">
 <meta http-equiv="refresh" content="0; url=/#inquiry-form">
 <link rel="canonical" href="https://coffeeandcrumbsva.com/#inquiry-form">
 <script>
  window.location.replace("/#inquiry-form");
 </script>
 <style>
  body {
   margin: 0;
   min-height: 100vh;
   display: grid;
   place-items: center;
   font-family: "Manrope", sans-serif;
   background: #fbf6ee;
   color: #1d1715;
  }

  .redirect-card {
   width: min(560px, calc(100% - 32px));
   padding: 32px 28px;
   border-radius: 28px;
   background: rgba(255, 255, 255, 0.88);
   border: 1px solid rgba(42, 24, 20, 0.10);
   box-shadow: 0 18px 48px rgba(55, 34, 23, 0.10);
   text-align: center;
  }

  h1 {
   margin: 0 0 12px;
   font-family: "Cormorant Garamond", serif;
   font-size: clamp(2.2rem, 5vw, 3.2rem);
   line-height: 0.95;
  }

  p {
   margin: 0 0 14px;
   color: #5c4f49;
  }

  a {
   color: #92452d;
   font-weight: 700;
   text-decoration: none;
  }
 </style>
</head>
<body>
 <main class="redirect-card">
  <h1>Taking you to the contact form.</h1>
  <p>The separate catering page has been removed. Larger order requests now live under the main contact section.</p>
  <p><a href="/#inquiry-form">Continue to the inquiry form</a></p>
 </main>
</body>
</html>
